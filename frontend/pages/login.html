<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to ReimburseApp — the RBAC reimbursement management system." />
  <title>Login — ReimburseApp</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <!-- Decorative background -->
  <div class="auth-bg-pattern" aria-hidden="true"></div>

  <main class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon" aria-hidden="true">💸</div>
        <span class="auth-logo-name">ReimburseApp</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <!-- Error alert (hidden by default) -->
      <div class="auth-alert error hidden" id="login-alert" role="alert" aria-live="assertive">
        <span class="auth-alert-icon" aria-hidden="true">⚠</span>
        <span id="login-alert-msg"></span>
      </div>

      <!-- Login Form -->
      <form id="login-form" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="login-email" class="form-label">
            Email address <span class="required" aria-hidden="true">*</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon-left" aria-hidden="true">✉</span>
            <input
              type="email"
              id="login-email"
              name="email"
              class="form-input has-icon-left"
              placeholder="you@org.com"
              autocomplete="email"
              required
              aria-required="true"
              aria-describedby="login-email-error"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="login-password" class="form-label">
            Password <span class="required" aria-hidden="true">*</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon-left" aria-hidden="true">🔒</span>
            <input
              type="password"
              id="login-password"
              name="password"
              class="form-input has-icon-left has-icon-right"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              aria-required="true"
              aria-describedby="login-password-error"
            />
            <button
              type="button"
              class="input-icon-right"
              id="toggle-password"
              aria-label="Toggle password visibility"
              title="Show / Hide password"
            >👁</button>
          </div>
        </div>

        <!-- Remember me + Forgot -->
        <div class="auth-extras">
          <label class="form-check">
            <input
              type="checkbox"
              id="login-remember"
              name="remember"
              aria-label="Remember me"
            />
            <span class="form-check-label">Remember me</span>
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn btn-primary btn-full btn-lg"
          id="login-submit-btn"
          aria-label="Sign in"
        >
          Sign in
        </button>

      </form>

      <!-- Footer link -->
      <p class="auth-footer">
        Don't have an account?
        <a href="register.html" id="go-to-register">Create account</a>
      </p>

    </div>
  </main>

  <!-- Page JS (ES Module) -->
  <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
